<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- Background: exact site blue -->
  <rect width="1200" height="630" fill="#111f9a"/>

  <!--
    Replicating .logo exactly, scaled 8x:
      .circle: width/height 20px -> r=80, border 2px -> stroke-width 16, margin-right 5px -> 40px
      .filled: background gold, no fill on first
      font-weight: 600, color gold

    circle 1 center x = 230 + 80 = 310
    circle 2 center x = 310 + 80(r) + 40(margin) + 80(r) = 510
    text x = 510 + 80(r) + 40(gap) = 630
  -->

  <!-- Circle 1: outline, no fill (r=72 so outer edge r+stroke/2=80 matches filled circle) -->
  <circle cx="310" cy="315" r="72" fill="none" stroke="#ffd700" stroke-width="16"/>

  <!-- Circle 2: filled, same radius -->
  <circle cx="510" cy="315" r="80" fill="#ffd700"/>

  <!-- "Abhi" text -->
  <text x="630" y="315"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="160" font-weight="600"
        fill="#ffd700"
        dominant-baseline="central">Abhi</text>

</svg>
